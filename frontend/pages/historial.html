<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Historial de Viajes — Viajes Barraza</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/index.css?v=2" />
</head>
<body>

<aside>
  <div class="logo-wrap">
    <div class="logo-mark">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <div>
        <div class="logo-text-main">ArchivoClientes</div>
        <div class="logo-text-sub">Viajes Barraza</div>
      </div>
    </div>
  </div>

  <nav>
    <div class="nav-section-label">Principal</div>
    <a href="index.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Panel Principal
    </a>
    <a href="clientes.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Clientes
    </a>
    <a href="expedientes.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
      Expedientes
    </a>
    <a href="historial.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Historial de Viajes
    </a>
    <a href="mapa.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Google Maps
    </a>
    <div class="nav-section-label" style="margin-top:12px">Sistema</div>
    <a href="reportes.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      Reportes PDF
    </a>
    <a href="configuracion.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      Configuración
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="avatar" id="sidebarAvatar">A</div>
      <div>
        <div class="user-name" id="sidebarNombre">Cargando...</div>
        <div class="user-role" id="sidebarRol">—</div>
      </div>
    </div>
  </div>
</aside>

<main>
  <header>
    <span class="page-title">Historial de Viajes</span>
    <button class="btn-primary" id="btnNuevoViaje">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" style="margin-right: 6px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Registrar Viaje
    </button>
  </header>

  <div class="content">
    <div class="card">
      <table style="width: 100%; text-align: left; border-collapse: collapse;">
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Destino</th>
            <th>Fechas</th>
            <th>Estatus</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaViajes">
          <tr><td colspan="5" style="text-align: center; color: var(--slate-400);">Cargando viajes...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal-backdrop" id="modalViajeBackdrop">
  <div class="modal" style="max-width: 500px;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
      <span class="modal-title">Registrar Nuevo Viaje</span>
      <button class="modal-close" id="modalViajeClose">✕</button>
    </div>

    <div style="display: flex; flex-direction: column; gap: 15px;">
      <div>
        <label style="font-size: 13px; font-weight: 600; color: var(--slate-700);">Cliente *</label>
        <select id="vCliente" class="form-input"></select>
      </div>
      
      <div>
        <label style="font-size: 13px; font-weight: 600; color: var(--slate-700);">País de Destino *</label>
        <select id="vDestino" class="form-input">
            <option value="">Selecciona un país...</option>
            <option value="Alemania">Alemania</option>
            <option value="Argentina">Argentina</option>
            <option value="Australia">Australia</option>
            <option value="Bahamas">Bahamas</option>
            <option value="Belice">Belice</option>
            <option value="Brasil">Brasil</option>
            <option value="Canadá">Canadá</option>
            <option value="Chile">Chile</option>
            <option value="China">China</option>
            <option value="Colombia">Colombia</option>
            <option value="Corea del Sur">Corea del Sur</option>
            <option value="Costa Rica">Costa Rica</option>
            <option value="Cuba">Cuba</option>
            <option value="Egipto">Egipto</option>
            <option value="Emiratos Árabes Unidos">Emiratos Árabes Unidos (Dubái)</option>
            <option value="España">España</option>
            <option value="Estados Unidos">Estados Unidos</option>
            <option value="Francia">Francia</option>
            <option value="Grecia">Grecia</option>
            <option value="Guatemala">Guatemala</option>
            <option value="India">India</option>
            <option value="Italia">Italia</option>
            <option value="Japón">Japón</option>
            <option value="Marruecos">Marruecos</option>
            <option value="México">México</option>
            <option value="Panamá">Panamá</option>
            <option value="Perú">Perú</option>
            <option value="Puerto Rico">Puerto Rico</option>
            <option value="Reino Unido">Reino Unido</option>
            <option value="República Dominicana">República Dominicana</option>
            <option value="Tailandia">Tailandia</option>
            <option value="Turquía">Turquía</option>
            <option value="Europa">Europa (Múltiples Destinos)</option>
            <option value="Asia">Asia (Múltiples Destinos)</option>
            <option value="Otro...">Otro destino (Escribir en Notas)</option>
        </select>
      </div>

      <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
          <label style="font-size: 13px; font-weight: 600; color: var(--slate-700);">Salida</label>
          <input type="date" id="vSalida" class="form-input">
        </div>
        <div style="flex: 1;">
          <label style="font-size: 13px; font-weight: 600; color: var(--slate-700);">Regreso</label>
          <input type="date" id="vRegreso" class="form-input">
        </div>
      </div>
      <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
          <label style="font-size: 13px; font-weight: 600; color: var(--slate-700);">Presupuesto ($)</label>
          <input type="number" id="vPresupuesto" class="form-input" placeholder="0.00">
        </div>
        <div style="flex: 1;">
          <label style="font-size: 13px; font-weight: 600; color: var(--slate-700);">Estatus</label>
          <select id="vEstatus" class="form-input">
            <option value="Cotizando">Cotizando</option>
            <option value="Confirmado">Confirmado</option>
            <option value="En curso">En curso</option>
            <option value="Finalizado">Finalizado</option>
            <option value="Cancelado">Cancelado</option>
          </select>
        </div>
      </div>

      <div style="margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px;">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--slate-700);">
              <input type="checkbox" id="checkAcompanantes" onchange="toggleAcompanantes()"> 
              ¿Lleva acompañantes en este viaje?
          </label>
          <div id="contenedorAcompanantes" style="display: none; background: #f8fafc; padding: 10px; border-radius: 6px; border: 1px dashed #cbd5e1; margin-top: 10px;">
              <div id="listaAcompanantes"></div>
              <button type="button" onclick="agregarCampoAcompanante()" style="margin-top: 8px; background: var(--teal-600); color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">
                  + Agregar acompañante
              </button>
          </div>
      </div>
    </div>

    <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px;">
      <button class="btn-secondary" id="btnCancelarViaje">Cancelar</button>
      <button class="btn-primary" id="btnGuardarViaje">Guardar Viaje</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"><span id="toastMsg"></span></div>

<script src="../js/auth.js"></script>
<script src="../js/historial.js"></script>
</body>
</html>
